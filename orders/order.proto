syntax = "proto3";

package pb;

option go_package = "github.com/ShivankSharma070/go-microservices-ecommerce/orders/pb";

message Order {
  message OrderedProduct {
    string id = 1;
    string name = 2;
    string description = 3;
    double price = 4;
    uint32 quantity = 5;
  }

  string id = 1;
  bytes create_at = 2;
  string account_id = 3;
  double total_price = 4;
  repeated OrderedProduct products = 5;
}

message PostOrderRequest {
  message OrderedProduct {
    string product_id = 1;
    uint32 quantity = 2;
  }
  string account_id = 1;
  repeated OrderedProduct products = 2;
}

message PostOrderResponse {
  Order order = 1;
}

message GetOrderRequest {
  string id = 1;
}

message GetOrderResponse {
  Order order = 1;
}

message GetOrderForAccountRequest {
  string account_id = 1;
}

message GetOrderForAccountResponse {
  repeated Order orders = 1;
}

service OrderService {
  rpc PostOrder(PostOrderRequest) returns (PostOrderResponse);
  rpc GetOrderForAccount(GetOrderForAccountRequest) returns (GetOrderForAccountResponse);
}
